{% extends 'base.html' %}
{% block title %}Cadastrar Bebida{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h2 class="mb-0"><i class="bi bi-plus-circle me-2 text-primary"></i>Cadastrar Bebida</h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST" novalidate>

                    <div class="mb-3">
                        <label for="nome" class="form-label fw-semibold">
                            Nome <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               id="nome"
                               name="nome"
                               class="form-control"
                               placeholder="Ex: Heineken LN 330ml, Coca-Cola 2L..."
                               value="{{ form.get('nome', '') }}"
                               required
                               autofocus>
                        <div class="form-text text-muted">Nome completo do produto</div>
                    </div>

                    <div class="mb-3">
                        <label for="categoria" class="form-label fw-semibold">
                            Categoria <span class="text-danger">*</span>
                        </label>
                        <select id="categoria" name="categoria" class="form-select" required>
                            <option value="">— Selecione uma categoria —</option>
                            {% for cat in categorias %}
                                <option value="{{ cat }}"
                                    {% if form.get('categoria') == cat %}selected{% endif %}>
                                    {{ cat }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label for="validade" class="form-label fw-semibold">
                                Data de Validade <span class="text-danger">*</span>
                            </label>
                            <input type="date"
                                   id="validade"
                                   name="validade"
                                   class="form-control"
                                   value="{{ form.get('validade', '') }}"
                                   required>
                        </div>
                        <div class="col-sm-6">
                            <label for="quantidade" class="form-label fw-semibold">
                                Quantidade <span class="text-danger">*</span>
                            </label>
                            <input type="number"
                                   id="quantidade"
                                   name="quantidade"
                                   class="form-control"
                                   placeholder="0"
                                   min="0"
                                   value="{{ form.get('quantidade', '') }}"
                                   required>
                        </div>
                        <div class="col-sm-6">
                            <label for="valor" class="form-label fw-semibold">
                                Valor Unitário (R$)
                            </label>
                            <input type="number"
                                   id="valor"
                                   name="valor"
                                   class="form-control"
                                   placeholder="0,00"
                                   min="0"
                                   step="0.01"
                                   value="{{ form.get('valor', '') }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-muted">Data de Registro</label>
                        <input type="text"
                               class="form-control bg-light"
                               value="Preenchida automaticamente pelo sistema"
                               disabled>
                        <div class="form-text text-muted">
                            <i class="bi bi-clock me-1"></i>
                            Registrado em: <strong id="data-agora"></strong>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-lg me-2"></i>Cadastrar
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                            Cancelar
                        </a>
                    </div>

                </form>
            </div>
        </div>

    </div>
</div>

<script>
    const el = document.getElementById('data-agora');
    const now = new Date();
    el.textContent = now.toLocaleString('pt-BR');
</script>
{% endblock %}
